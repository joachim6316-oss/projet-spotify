<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap CSS -->
    <title>Spoti'stat</title>
  </head>
  <body>
    <header class="bg-primary text-white text-center py-4">
      <h1>Les musiques de Marill</h1>
      <p>
        je n'ai pas d'inspi pour le sous titre, de toute façon, vous savez ce
        qui va y avoir
      </p>
    </header>

    <section class="container my-4">
    <div class="row">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-primary text-white">Top 10 des Artistes</div>
          <div class="card-body">
            <canvas id="topArtistes"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-success text-white">Distribution des Genres</div>
          <div class="card-body" style="height: 400px;">
            <canvas id="distGenres"></canvas>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="container my-4" x-data="tableauMusiques()">
    <div class="card">
      <div
        class="card-header bg-info text-white d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
        <span>Liste des Morceaux</span>
        <input type="text" class="form-control w-100 w-md-25" placeholder="Rechercher..." x-model="recherche">
      </div>
      <div class="table-responsive">
        <table class="table table-striped mb-0">
          <thead>
            <tr>
              <th>Titre</th>
              <th>Artiste</th>
              <th>Album</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="track in morceauxFiltres()" :key="track.id">
              <tr>
                <td x-text="track.name"></td>
                <td x-text="track.artists[0].name"></td>
                <td x-text="track.album.name"></td>
                <td>
                  <button class="btn btn-primary btn-sm" @click="ouvrirDetails(track)">ℹ️ Détails</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="container my-4" x-data="albums()">
    <h4 class="mb-3">Albums Populaires</h4>
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-3">
      <template x-for="album in albumsListe" :key="album.id">
        <div class="col">
          <div class="card h-100">
            <img :src="album.image" class="card-img-top" style="height: 120px; object-fit: cover;">
            <div class="card-body p-2">
              <h6 class="card-title" style="font-size: 0.85rem;" x-text="album.name"></h6>
              <p class="text-muted mb-1" style="font-size: 0.8rem;" x-text="album.artist"></p>
              <p class="mb-2" style="font-size: 0.75rem;" x-text="album.date"></p>
              <span class="badge bg-info me-1" x-text="album.titres + ' titres'"></span>
              <span class="badge bg-success" x-text="album.score + '/100'"></span>
            </div>
          </div>
        </div>
      </template>
    </div>
  </section>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"
    ></script>
    <script src="script/script.js"></script>
  </body>
</html>
